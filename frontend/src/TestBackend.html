<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前后端协同测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .section {
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 1px solid #eee;
        }
        
        .section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #555;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }
        
        .section-title::before {
            content: "";
            width: 4px;
            height: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin-right: 10px;
            border-radius: 2px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #666;
            font-size: 14px;
        }
        
        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .result {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .result.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        
        .result.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-left: 10px;
            background: #ff6b6b;
            animation: pulse 2s infinite;
        }
        
        .status-indicator.online {
            background: #51cf66;
        }
        
        @keyframes pulse {
            0% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
            100% {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            前后端协同测试
            <span class="status-indicator" id="statusIndicator"></span>
        </h1>
        
        <div class="section">
            <div class="section-title">
                后端连接状态
            </div>
            <button onclick="checkBackendStatus()">检查后端状态</button>
            <div id="backendStatus" class="result"></div>
        </div>
        
        <div class="section">
            <div class="section-title">
                用户注册测试
            </div>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" placeholder="testuser" value="testuser4">
            </div>
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="email" placeholder="test@example.com" value="testuser4@example.com">
            </div>
            <div class="form-group">
                <label>姓名</label>
                <input type="text" id="fullName" placeholder="Test User" value="测试用户4">
            </div>
            <div class="form-group">
                <label>角色</label>
                <select id="role">
                    <option value="student">学生</option>
                    <option value="teacher">教师</option>
                    <option value="admin">管理员</option>
                </select>
            </div>
            <button onclick="registerUser()">注册用户</button>
            <div id="registerResult" class="result"></div>
        </div>
        
        <div class="section">
            <div class="section-title">
                用户列表
            </div>
            <button onclick="getUsers()">获取所有用户</button>
            <div id="usersResult" class="result"></div>
        </div>
    </div>
    
    <script>
        const API_BASE_URL = 'http://localhost:8000';
        
        async function checkBackendStatus() {
            const resultDiv = document.getElementById('backendStatus');
            const indicator = document.getElementById('statusIndicator');
            
            try {
                const response = await fetch(`${API_BASE_URL}/health`);
                const data = await response.json();
                
                indicator.classList.add('online');
                resultDiv.innerHTML = `
                    <strong>✅ 后端在线</strong><br>
                    状态: ${data.status}<br>
                    时间: ${new Date().toLocaleString()}
                `;
                resultDiv.classList.add('success');
                resultDiv.classList.remove('error');
            } catch (error) {
                indicator.classList.remove('online');
                resultDiv.innerHTML = `<strong>❌ 后端离线</strong><br>错误: ${error.message}`;
                resultDiv.classList.add('error');
                resultDiv.classList.remove('success');
            }
        }
        
        async function registerUser() {
            const resultDiv = document.getElementById('registerResult');
            const indicator = document.getElementById('statusIndicator');
            
            const user = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                full_name: document.getElementById('fullName').value,
                role: document.getElementById('role').value
            };
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/v1/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(user)
                });
                
                const data = await response.json();
                
                indicator.classList.add('online');
                resultDiv.innerHTML = `
                    <strong>✅ 注册成功</strong><br>
                    用户ID: ${data.id}<br>
                    用户名: ${data.username}<br>
                    邮箱: ${data.email}<br>
                    角色: ${data.role}
                `;
                resultDiv.classList.add('success');
                resultDiv.classList.remove('error');
            } catch (error) {
                indicator.classList.remove('online');
                resultDiv.innerHTML = `<strong>❌ 注册失败</strong><br>错误: ${error.message}`;
                resultDiv.classList.add('error');
                resultDiv.classList.remove('success');
            }
        }
        
        async function getUsers() {
            const resultDiv = document.getElementById('usersResult');
            const indicator = document.getElementById('statusIndicator');
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/v1/users`);
                const data = await response.json();
                
                indicator.classList.add('online');
                
                const usersHtml = data.users.map(u => `
                    <div style="margin-bottom: 10px; padding: 10px; background: #fff; border: 1px solid #eee; border-radius: 6px;">
                        <strong>${u.full_name}</strong> (${u.role})<br>
                        <small>ID: ${u.id} | ${u.email}</small>
                    </div>
                `).join('');
                
                resultDiv.innerHTML = `
                    <strong>✅ 获取成功 (${data.users.length} 个用户)</strong><br>
                    ${usersHtml}
                `;
                resultDiv.classList.add('success');
                resultDiv.classList.remove('error');
            } catch (error) {
                indicator.classList.remove('online');
                resultDiv.innerHTML = `<strong>❌ 获取失败</strong><br>错误: ${error.message}`;
                resultDiv.classList.add('error');
                resultDiv.classList.remove('success');
            }
        }
        
        // 自动检查后端状态
        window.onload = function() {
            checkBackendStatus();
        };
    </script>
</body>
</html>
